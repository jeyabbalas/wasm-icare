# Dependabot keeps the GitHub Actions pinned in .github/workflows/ up to date, so a
# forced runtime deprecation (e.g. the Node 20 -> 24 migration) arrives as a PR
# rather than a red nightly. https://docs.github.com/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "github-actions"
    # "/" scans .github/workflows/ (ci.yml, publish.yml).
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    # Bundle every action bump into ONE PR per run instead of one PR per action.
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    # "/" scans package.json + package-lock.json at the repo root.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    # Low-risk minor/patch bumps (prod + dev) land in one PR; MAJOR bumps get their
    # own PR each, so a potentially breaking upgrade is reviewed on its own.
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # pyodide is pinned exact and coordinated by hand with src/runtime/config.ts
      # (PYODIDE_VERSION), the vendored wheel in assets/wheels/, and the CI cache key.
      # A drop-in bump would be a half-change that fails CI — keep it manual.
      - dependency-name: "pyodide"
      # tsup's bundled rollup-plugin-dts does not support TypeScript 7's rewritten
      # compiler API yet — the build crashes. Revisit when the toolchain catches up.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
